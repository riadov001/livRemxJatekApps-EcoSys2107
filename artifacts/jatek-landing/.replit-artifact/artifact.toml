kind = "web"
previewPath = "/"
title = "Jatek Landing"
version = "1.0.0"
id = "artifacts/jatek-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/jatek-landing run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/jatek-landing", "run", "build"]
publicDir = "artifacts/jatek-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
